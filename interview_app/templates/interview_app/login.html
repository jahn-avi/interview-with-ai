<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Interview.AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 font-sans min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full bg-white p-10 rounded-[2.5rem] shadow-2xl border border-gray-100">
        <div class="text-center mb-8">
            <a href="/" class="text-2xl font-black text-red-600 tracking-tighter inline-block mb-4">
                INTERVIEW<span class="text-gray-400">.AI</span>
            </a>
            <h1 class="text-3xl font-black text-gray-900 tracking-tight">Welcome Back</h1>
            <p class="text-gray-500 mt-2">Sign in to continue your preparation.</p>
        </div>

        {% if form.errors %}
            <div class="bg-red-50 text-red-600 p-4 rounded-xl mb-6 text-sm font-bold flex items-center gap-3">
                <i class="fas fa-exclamation-circle"></i>
                Invalid username or password.
            </div>
        {% endif %}

        <form method="POST" class="space-y-6">
            {% csrf_token %}
            
            <div>
                <label class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-2">Username</label>
                <input type="text" name="username" required class="w-full p-4 bg-gray-50 border-2 border-gray-100 rounded-2xl focus:border-red-600 focus:bg-white outline-none transition">
            </div>

            <div>
                <label class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-2">Password</label>
                <input type="password" name="password" required class="w-full p-4 bg-gray-50 border-2 border-gray-100 rounded-2xl focus:border-red-600 focus:bg-white outline-none transition">
            </div>

            <button type="submit" class="w-full bg-red-600 text-white py-4 rounded-2xl font-black text-lg hover:bg-red-700 transition transform hover:scale-[1.02] shadow-xl shadow-red-100">
                Log In
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-gray-100 text-center">
            <p class="text-gray-500">New to the platform?</p>
            <a href="{% url 'register' %}" class="text-red-600 font-black hover:text-red-800 transition">Create an Account</a>
        </div>
    </div>

</body>
</html>
