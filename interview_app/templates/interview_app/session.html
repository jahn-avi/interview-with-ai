<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Interview Session</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 font-sans min-h-screen">
    <nav class="bg-white border-b p-4 shadow-sm">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <span class="text-xl font-black text-red-600">INTERVIEW.AI</span>
            <a href="/" class="text-gray-500 hover:text-red-600 transition font-medium text-sm">Exit Session</a>
        </div>
    </nav>

    <div class="max-w-3xl mx-auto mt-12 px-6">
        <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100">
            <div class="bg-red-600 p-6 text-white">
                <h2 class="text-lg opacity-80 uppercase tracking-widest font-bold text-sm">Current Role</h2>
                <p class="text-2xl font-bold">{{ role }}</p>
            </div>
            
            <div class="p-8">
                <div class="flex items-start mb-8">
                    <div class="bg-red-100 text-red-600 p-3 rounded-2xl mr-4">
                        <i class="fas fa-robot text-xl"></i>
                    </div>
                    <div class="bg-gray-100 p-6 rounded-2xl rounded-tl-none text-gray-800 font-medium leading-relaxed">
                        "Welcome! To start off, could you tell me a bit about your background and why you're interested in this position?"
                    </div>
                </div>

                <div class="relative">
                    <textarea 
                        placeholder="Type your response here..." 
                        class="w-full h-40 p-5 bg-white border-2 border-gray-200 rounded-2xl focus:border-red-600 focus:ring-0 transition resize-none outline-none"
                    ></textarea>
                    
                    <div class="mt-6 flex justify-end">
                        <button class="bg-red-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-red-700 transition shadow-lg shadow-red-200 flex items-center">
                            Submit Answer <i class="fas fa-paper-plane ml-2 text-sm"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-8 text-center">
            <p class="text-gray-400 text-sm italic">Tip: Be concise and use specific examples from your past projects.</p>
        </div>
    </div>
</body>
</html>
