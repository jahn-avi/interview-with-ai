<!DOCTYPE html>
<html>
<head>
    <title>AI Interview Session</title>
</head>
<body style="font-family: Arial; padding: 50px; background-color: #f4f7f6;">
    <div style="max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
        <h2>Interviewing as: <span style="color: #007bff;">{{ role }}</span></h2>
        <hr>
        
        <div id="ai-question" style="margin: 20px 0; font-size: 18px; font-weight: bold; color: #333;">
            AI: "Welcome! Tell me about yourself and your background."
        </div>

        <textarea placeholder="Type your answer here..." style="width: 100%; height: 100px; padding: 10px; border-radius: 5px; border: 1px solid #ccc;"></textarea>
        
        <br><br>
        
        <button style="padding: 10px 20px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer;">
            Submit Answer
        </button>
    </div>
</body>
</html>
