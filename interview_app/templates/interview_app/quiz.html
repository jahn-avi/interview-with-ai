<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Question | Interview.AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="max-w-4xl mx-auto py-12 px-6">
        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100">
            <div class="bg-red-600 p-8 text-white flex justify-between items-center">
                <div>
                    <h2 class="text-xs font-black uppercase tracking-widest opacity-70">Testing Skill: {{ skill }}</h2>
                    <p class="text-2xl font-bold">{{ difficulty }} Level</p>
                </div>
                <div class="text-4xl opacity-20"><i class="fas fa-brain"></i></div>
            </div>

            <div class="p-10">
                <div class="mb-10">
                    <h3 class="text-sm font-black text-red-600 uppercase tracking-widest mb-4">Question</h3>
                    <p class="text-2xl font-medium text-gray-800 leading-relaxed">{{ question }}</p>
                </div>

                <form action="{% url 'ai_questions' %}" method="POST">
                    {% csrf_token %}
                    <input type="hidden" name="question" value="{{ question }}">
                    <label class="block text-sm font-black text-gray-400 uppercase tracking-widest mb-4">Your Answer</label>
                    <textarea 
                        name="user_answer" 
                        required
                        placeholder="Explain your approach here..."
                        class="w-full h-64 p-6 bg-gray-50 border-2 border-gray-100 rounded-2xl focus:border-red-600 focus:bg-white outline-none transition text-lg"
                    ></textarea>

                    <div class="mt-8 flex justify-end">
                        <button type="submit" class="bg-red-600 text-white px-10 py-4 rounded-xl font-black hover:bg-red-700 transition shadow-lg flex items-center gap-3">
                            Submit for Grading <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
