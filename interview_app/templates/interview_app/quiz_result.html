<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Feedback | Interview.AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .prose h3 { color: #dc2626; font-weight: 900; margin-top: 1.5rem; margin-bottom: 0.5rem; font-size: 1.25rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .prose p { margin-bottom: 1rem; color: #4b5563; line-height: 1.7; }
        .prose strong { color: #111827; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <div class="max-w-4xl mx-auto py-16 px-6">
        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100">
            <div class="p-10">
                <div class="flex items-center gap-4 mb-8 pb-6 border-b border-gray-100">
                    <div class="bg-green-100 text-green-600 p-4 rounded-2xl">
                        <i class="fas fa-check-double text-2xl"></i>
                    </div>
                    <div>
                        <h2 class="text-2xl font-black text-gray-900">AI Evaluation Complete</h2>
                        <p class="text-gray-400 text-sm font-bold uppercase tracking-widest">Performance Analysis</p>
                    </div>
                </div>

                <div class="prose max-w-none">
                    {{ feedback|safe }}
                </div>

                <div class="mt-12 flex gap-4">
                    <a href="{% url 'ai_questions' %}" class="flex-1 text-center bg-red-600 text-white py-4 rounded-xl font-black hover:bg-red-700 transition">
                        Try Another Question
                    </a>
                    <a href="/dashboard/" class="flex-1 text-center border-2 border-gray-100 py-4 rounded-xl font-black text-gray-500 hover:border-red-600 hover:text-red-600 transition">
                        Back to Dashboard
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
